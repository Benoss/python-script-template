{% with variant=variant|default:"info" %}
<div role="alert" class="rounded-lg border px-4 py-3 {% if variant == "success" %}border-green-200 bg-green-50 text-green-800{% elif variant == "warning" %}border-yellow-200 bg-yellow-50 text-yellow-800{% elif variant == "danger" %}border-red-200 bg-red-50 text-red-800{% else %}border-blue-200 bg-blue-50 text-blue-800{% endif %}">
    {% if title %}
        <div class="font-semibold">{{ title }}</div>
        <div class="mt-1 text-sm">
            {{ slot }}
        </div>
    {% else %}
        <div class="text-sm">
            {{ slot }}
        </div>
    {% endif %}
</div>
{% endwith %}
