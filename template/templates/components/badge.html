{% with variant=variant|default:"neutral" %}
<span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold {% if variant == "success" %}bg-green-100 text-green-800{% elif variant == "warning" %}bg-yellow-100 text-yellow-800{% elif variant == "danger" %}bg-red-100 text-red-800{% elif variant == "info" %}bg-blue-100 text-blue-800{% else %}bg-gray-100 text-gray-800{% endif %}">
    {{ slot }}
</span>
{% endwith %}
